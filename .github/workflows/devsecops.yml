name: DevSecOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:

env:
  IMAGE_NAME: ghcr.io/kauaiduha/juice-shop-lab
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image reference
        id: meta
        run: echo "image_ref=${IMAGE_NAME}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: docker build -t "${IMAGE_NAME}:${IMAGE_TAG}" .

      - name: Save image as artifact
        run: docker save "${IMAGE_NAME}:${IMAGE_TAG}" -o juice-shop-lab.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: juice-shop-lab-image
          path: juice-shop-lab.tar

  sast:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

      - name: SonarQube quality gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

  sca:
    runs-on: ubuntu-latest
    needs:
      - build
      - sast
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: juice-shop-lab-image

      - name: Load image
        run: docker load -i juice-shop-lab.tar

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ needs.build.outputs.image_ref }}
          severity: HIGH,CRITICAL
          exit-code: 1

  push:
    runs-on: ubuntu-latest
    needs:
      - build
      - sast
      - sca
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: juice-shop-lab-image

      - name: Load image
        run: docker load -i juice-shop-lab.tar

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: docker push "${IMAGE_NAME}:${IMAGE_TAG}"

  deploy:
    runs-on: ubuntu-latest
    needs:
      - push
    if: false
    steps:
      - name: Placeholder
        run: echo "Enable this job only after adding cluster credentials for CI deploy."
