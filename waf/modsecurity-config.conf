SecRuleEngine On
SecAuditEngine RelevantOnly
SecAuditLogParts ABIJDEFHZ
SecAuditLog /var/log/modsec_audit.log

# Lab-specific blocking rule used to generate clear evidence during validation.
SecRule REQUEST_URI|ARGS|REQUEST_BODY "@rx (?i:(\bunion\b.+\bselect\b|\bor\b\s+1=1|<script|javascript:))" \
  "id:100100,phase:2,deny,status:403,log,msg:'Blocked basic SQLi/XSS payload in Juice Shop ingress'"
